3d false;\\n        let dateToday \x3d new Date().toISOString().split(\x27T\x27)\x5b0\x5d;\\n\\n        \\n        const currentDateDisplay \x3d document.getElementById(\x27current-date-display\x27);\\n        const entryDateInput \x3d document.getElementById(\x27entry-date\x27);\\n        const statementStartDateInput \x3d document.getElementById(\x27statement-start-date\x27);\\n        const statementEndDateInput \x3d document.getElementById(\x27statement-end-date\x27);\\n\\n        \\n        function safeParseDate(dateVal) \x7b\\n            if (!dateVal) return new Date();\\n            if (dateVal instanceof Date) return dateVal;\\n            let str \x3d String(dateVal).trim();\\n            str \x3d str.replace(\/-\/g, \x27\/\x27);\\n            const d \x3d new Date(str);\\n            if (!isNaN(d.getTime())) return d;\\n            \\n            const parts \x3d str.split(\x27\/\x27);\\n            if (parts.length \x3d\x3d\x3d 3) \x7b\\n                if (parts\x5b2\x5d.length \x3d\x3d\x3d 4) \x7b \\n                    return new Date(parseInt(parts\x5b2\x5d, 10), parseInt(parts\x5b1\x5d, 10) - 1, parseInt(parts\x5b0\x5d, 10));\\n                \x7d\\n                if (parts\x5b0\x5d.length \x3d\x3d\x3d 4) \x7b \\n                    return new Date(parseInt(parts\x5b0\x5d, 10), parseInt(parts\x5b1\x5d, 10) - 1, parseInt(parts\x5b2\x5d, 10));\\n                \x7d\\n            \x7d\\n            return new Date(dateVal);\\n        \x7d\\n\\n        \\n        function callAppsScript(functionName, ...args) \x7b\\n            return new Promise((resolve, reject) \x3d\x3e \x7b\\n                if (typeof google \x3d\x3d\x3d \x27undefined\x27 || !google.script || !google.script.run) \x7b\\n                    reject(new Error(\\\x22بيئة Google Apps Script غير متوفرة\\\x22));\\n                    return;\\n                \x7d\\n                google.script.run\\n                    .withSuccessHandler(result \x3d\x3e \x7b\\n                        if (result \x26\x26 result.error) \x7b\\n                            reject(new Error(result.error));\\n                        \x7d else \x7b\\n                            resolve(result);\\n                        \x7d\\n                    \x7d)\\n                    .withFailureHandler(error \x3d\x3e \x7b\\n                        reject(new Error(error.message || error));\\n                    \x7d)\\n                    \x5bfunctionName\x5d(...args);\\n            \x7d);\\n        \x7d\\n\\n        const originalFetch \x3d window.fetch;\\n        window.fetch \x3d async function (url, options \x3d \x7b\x7d) \x7b\\n            const isGoogleAppsScript \x3d (typeof google !\x3d\x3d \x27undefined\x27 \x26\x26 google.script \x26\x26 google.script.run);\\n\\n            if (url.includes(\x27\/api\x27)) \x7b\\n                const isEmployees \x3d url.includes(\x27\/employees\x27);\\n                const isArchive \x3d url.includes(\x27\/archive\x27);\\n                const isStatement \x3d url.includes(\x27\/statement\x27);\\n                const isInitialData \x3d url.includes(\x27\/initial-data\x27);\\n                const method \x3d (options.method || \x27GET\x27).toUpperCase();\\n\\n                \\n                if (isGoogleAppsScript) \x7b\\n                    let result;\\n                    try \x7b\\n                        if (method \x3d\x3d\x3d \x27GET\x27) \x7b\\n                            if (isEmployees) \x7b\\n                                result \x3d await callAppsScript(\x27getEmployeesData\x27);\\n                            \x7d else if (isInitialData) \x7b\\n                                let start \x3d \x27\x27;\\n                                let end \x3d \x27\x27;\\n                                try \x7b\\n                                    const urlObj \x3d new URL(url, window.location.origin);\\n                                    start \x3d urlObj.searchParams.get(\x27startDate\x27) || \x27\x27;\\n
